<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }

  /* ---- collage ---- */
  #collage {
    position: fixed;
    inset: 0;
    display: grid;
    gap: 4px;
    z-index: 0;
  }
  .cell {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    cursor: pointer;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s, z-index 0s;
    filter: brightness(.75);
  }
  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity .45s ease;
  }
  .cell img.swapping { opacity: 0; }
  .cell:hover {
    transform: scale(1.22);
    z-index: 20;
    filter: brightness(1.05);
    box-shadow: 0 8px 40px rgba(0,0,0,.9), 0 0 0 2px rgba(255,255,255,.7);
    border-radius: 10px;
  }

  /* ---- mcap counter ---- */
  #mcap {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.35);
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(6px);
    color: #fff;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: .5px;
  }
  #mcap .label { opacity: .6; font-size: .8rem; font-weight: 700; }
  #mcap .val { transition: color .3s; }
  #mcap .val.up { color: #4ade80; }
  #mcap .val.down { color: #f87171; }

  /* ---- top holders dropdown ---- */
  #holders {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    padding-top: 10px;
    width: 300px;
    cursor: default;
  }
  #mcap:hover #holders { display: block; }
  .holders-inner {
    background: rgba(0,0,0,.85);
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 10px;
    backdrop-filter: blur(8px);
    padding: 12px 14px;
  }
  .holders-title {
    color: rgba(255,255,255,.6);
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .holder-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    font-size: .85rem;
    font-weight: 600;
  }
  .holder-row a {
    color: #fff;
    text-decoration: none;

    opacity: .9;
  }
  .holder-row a:hover { text-decoration: underline; opacity: 1; }
  .holder-row .amt { color: rgba(255,255,255,.55); font-size: .78rem; }
  .holder-row .pct { color: #f5c518; min-width: 52px; text-align: right; }
  .holders-note { color: rgba(255,255,255,.35); font-size: .68rem; margin-top: 8px; }

  /* ---- lightbox ---- */
  #lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.88);
    backdrop-filter: blur(10px);
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    border-radius: 12px;
    box-shadow: 0 20px 80px rgba(0,0,0,.8);

  #lightbox .close:hover { opacity: 1; }

  .ticker {

    letter-spacing: 2px;

  /* ---- case opening ---- */
  #casebox {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.92);
    backdrop-filter: blur(12px);
  }
  #casebox.open { display: flex; }
  .case-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    width: 100%;
  }
  .case-title {
    color: #fff;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 1px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .case-title img { height: clamp(120px, 22vh, 180px); filter: drop-shadow(0 10px 30px rgba(0,0,0,.6)); }

  .case-viewport {
    position: relative;
    width: min(900px, 94vw);
    height: 140px;
    overflow: hidden;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.04);
    box-shadow: inset 0 0 40px rgba(0,0,0,.8);
  }
  .case-viewport::before {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 3px;
    transform: translateX(-50%);
    background: #f5c518;
    z-index: 5;
    box-shadow: 0 0 12px #f5c518;
  }
  .case-viewport::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: linear-gradient(to right, rgba(0,0,0,.85), transparent 18%, transparent 82%, rgba(0,0,0,.85));
  }
  .case-strip {
    position: absolute;
    top: 15px;
    left: 0;
    display: flex;
    gap: 6px;

  .case-item {
    flex: 0 0 100px;

  .case-item img {

  .case-result {

  .case-result.show { display: flex; animation: pop .35s cubic-bezier(.34,1.56,.64,1); }
  .case-result img {

  .case-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .case-actions .btn { cursor: pointer; }

  .case-close {
    position: absolute;

    color: #fff;

  .socials { display: flex; gap: 18px; }

  }
  .socials a:hover { transform: scale(1.12); border-color: #fff; }
  .socials svg { width: 22px; height: 22px; fill: #fff; }

<script>
const IMAGES = [
  "HNR3_iRacAAU--N.jpg","HNR_lj9WsAAntmd.jpg","HNScHVrWgAE4Myp.jpg","HNSn1xHaoAA0B7l.jpg",
  "HNT-tMga0AAiXOF.jpg","HNT7hVUW8AAdpsH.jpg","HNTI18tXEAA-Lv6.png","HNTI4XgW8AEF-P1.jpg",
  "HNTOPKIXcAE1bdF.png","HNTOkXnWAAAHjdi.jpg","HNTOwsCWUAAxMKW.jpg","HNTOwsKX0AAv7K9.jpg",
  "HNTQVYBWEAAR_w_.jpg","HNTZtMuXoAANZm3.jpg","HNTllg5XUAA9_ed.jpg","HNTyCsCaoAAAZ_l.jpg",
  "HNU1fM6WsAAb9E_.jpg","HNUDaxUWwAAgY9K.jpg","HNUJdSwa0AA5gsT.jpg","HNULVeqWQAAywUE.jpg",
  "HNUNU9facAAt6-a.jpg","HNUNbFzW8AAqxfI.jpg","HNUPGIIbMAAAV7i.jpg","HNURzP0bEAAE8iT.jpg",
  "HNUW6ykWYAAspge.jpg","HNUgrOOXYAAUQ6M.jpg","HNW-HONagAAErxX.jpg","HNW3_EuXkAA2VIU.jpg",
  "HNW4wD4aYAAXk_a.jpg","HNX1oNWX0AAYlPs.jpg","HNX1oNZXQAApN3a.jpg","HNXEGribMAAl_q5.jpg",
  "HNXG1TrawAAIMMI.jpg","HNXIhZVbAAA1cH3.jpg","HNXVA0Mb0AAEBSQ.jpg","HNXWyf7bUAAEvfp.jpg",
  "HNXXxpbaQAAstM7.jpg","HNXZ7HVbEAAPKUr.jpg","HNXaGUvaYAAFHXQ.jpg",
  "IMG_6835.png","IMG_6836.png"
];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildCollage() {
  const grid = document.getElementById('collage');
  grid.innerHTML = '';
  const n = IMAGES.length;
  const ratio = window.innerWidth / window.innerHeight;
  let cols = Math.max(3, Math.round(Math.sqrt(n * ratio)));
  let rows = Math.ceil(n / cols);
  const total = cols * rows;

  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  let pool = shuffle(IMAGES);
  while (pool.length < total) pool = pool.concat(shuffle(IMAGES));

  // assign so no image touches a duplicate (left or above)
  const chosen = [];
  for (let i = 0; i < total; i++) {
    const left = (i % cols !== 0) ? chosen[i - 1] : null;
    const top  = (i >= cols) ? chosen[i - cols] : null;
    let pick = pool.findIndex(s => s !== left && s !== top);
    if (pick === -1) pick = 0;
    chosen.push(pool.splice(pick, 1)[0]);
  }

  gridCells = [];
  gridCols = cols;
  logicalSrc = chosen.slice();
  for (const src of chosen) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.alt = 'juhn';
    cell.appendChild(img);
    cell.addEventListener('click', () => openLightbox(img.src));
    grid.appendChild(cell);
    gridCells.push(cell);
  }
}
let gridCells = [], gridCols = 0, logicalSrc = [];

function cellSrc(i) { return logicalSrc[i]; }
function neighborIdxs(i) {
  const ns = [];
  if (i % gridCols !== 0) ns.push(i - 1);
  if ((i + 1) % gridCols !== 0 && i + 1 < gridCells.length) ns.push(i + 1);
  if (i - gridCols >= 0) ns.push(i - gridCols);
  if (i + gridCols < gridCells.length) ns.push(i + gridCols);
  return ns;
}
function clashes(i, src, otherIdx) {
  return neighborIdxs(i).some(n => n !== otherIdx && cellSrc(n) === src);
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildCollage, 200);
});

buildCollage();

// ---- dynamic shuffling: swap random tiles every few seconds ----
const SWAP_INTERVAL = 3000;   // ms between swap rounds
const SWAPS_PER_ROUND = 4;    // how many pairs swap each round

function swapRound() {
  if (document.hidden) return;
  if (document.getElementById('lightbox').classList.contains('open')) return;

  if (gridCells.length < 2) return;

  for (let k = 0; k < SWAPS_PER_ROUND; k++) {
    const i = Math.floor(Math.random() * gridCells.length);
    const j = Math.floor(Math.random() * gridCells.length);
    const a = gridCells[i], b = gridCells[j];
    if (a === b || a.matches(':hover') || b.matches(':hover')) continue;
    if (neighborIdxs(i).includes(j)) continue;
    // skip if swap would put duplicates next to each other
    if (clashes(i, cellSrc(j), j) || clashes(j, cellSrc(i), i)) continue;
    // commit the swap logically right away so later checks this round see it
    [logicalSrc[i], logicalSrc[j]] = [logicalSrc[j], logicalSrc[i]];
    const imgA = a.querySelector('img');
    const imgB = b.querySelector('img');
    const newA = logicalSrc[i], newB = logicalSrc[j];
    imgA.classList.add('swapping');
    imgB.classList.add('swapping');
    setTimeout(() => {
      imgA.src = newA;
      imgB.src = newB;
      imgA.classList.remove('swapping');
      imgB.classList.remove('swapping');
    }, 450);
  }
}
setInterval(swapRound, SWAP_INTERVAL);

// ---- csgo-style case opening ----
const ITEM_W = 100, GAP = 6, STEP = ITEM_W + GAP;
const STRIP_LEN = 60;      // total tiles in the reel
const WINNER_INDEX = 52;   // where the winner sits
let spinning = false;

function openCase() {
  document.getElementById('casebox').classList.add('open');
  startSpin();
}
function closeCase() {
  if (spinning) return;
  document.getElementById('casebox').classList.remove('open');
}

function startSpin() {
  if (spinning) return;
  spinning = true;

  document.getElementById('caseResult').classList.remove('show');
  const strip = document.getElementById('caseStrip');
  const viewport = document.getElementById('caseViewport');
  strip.innerHTML = '';

  // build the reel
  const winner = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  let prev = null;
  for (let i = 0; i < STRIP_LEN; i++) {
    const item = document.createElement('div');
    item.className = 'case-item';
    const img = document.createElement('img');
    let src;
    if (i === WINNER_INDEX) {
      src = winner;
    } else {
      do { src = IMAGES[Math.floor(Math.random() * IMAGES.length)]; }
      while (src === prev || (i === WINNER_INDEX - 1 && src === winner));
    }
    prev = src;
    img.src = src;
    item.appendChild(img);
    strip.appendChild(item);
  }

  // reset position
  strip.style.transition = 'none';
  strip.style.transform = 'translateX(0)';
  void strip.offsetWidth; // force reflow

  // land on winner: center of winner tile under the marker, with slight random offset
  const jitter = (Math.random() - 0.5) * (ITEM_W * 0.6);
  const target = WINNER_INDEX * STEP + ITEM_W / 2 - viewport.clientWidth / 2 + jitter;

  strip.style.transition = 'transform 6.5s cubic-bezier(.12,.85,.15,1)';
  strip.style.transform = `translateX(${-target}px)`;

  strip.addEventListener('transitionend', () => {
    spinning = false;
    const resultImg = document.getElementById('caseResultImg');
    resultImg.src = winner;
    document.getElementById('caseDownload').href = winner;
    document.getElementById('caseResult').classList.add('show');
  }, { once: true });
}

async function copyPfp() {
  const btn = document.getElementById('caseCopy');
  try {
    const img = document.getElementById('caseResultImg');
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    btn.textContent = 'Copied!';
  } catch (e) {
    btn.textContent = 'Copy failed :(';
  }
  setTimeout(() => btn.textContent = 'Copy PFP', 1500);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCase(); });

// ---- live market cap (DexScreener API, polls every 5s) ----
const CA_ADDR = '757HeY3oyKhQCPbeTzcVX1PyTWzUvJwVfVUVvXsgpump';
function fmtMcap(n) {
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + Math.round(n);
}
async function updateMcap() {
  try {
    const r = await fetch('https://api.dexscreener.com/latest/dex/tokens/' + CA_ADDR);
    const d = await r.json();
    const p = d.pairs && d.pairs[0];
    const mc = p && (p.marketCap ?? p.fdv);
    if (mc == null) return;
    const el = document.getElementById('mcapVal');
    const prev = parseFloat(el.dataset.raw || '0');
    el.textContent = fmtMcap(mc);
    el.dataset.raw = mc;
    el.classList.remove('up', 'down');
    if (prev && mc !== prev) el.classList.add(mc > prev ? 'up' : 'down');
  } catch (e) { /* keep last value */ }
}
updateMcap();
setInterval(updateMcap, 5000);

// ---- top 5 holders (Solana RPC, refreshed on hover, max every 30s) ----
const RPCS = ['https://greer-651y13-fast-mainnet.helius-rpc.com/', 'https://solana-rpc.publicnode.com', 'https://api.mainnet-beta.solana.com'];
let holdersFetchedAt = 0;

async function solRpc(method, params) {
  for (const url of RPCS) {
    try {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params })
      });
      const d = await r.json();
      if (d.result) return d.result;
    } catch (e) { /* try next rpc */ }
  }
  throw new Error('rpc failed');
}

function shortAddr(a) { return a.slice(0, 4) + '…' + a.slice(-4); }
function fmtTokens(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toString();
}

async function loadHolders() {
  if (Date.now() - holdersFetchedAt < 30000) return;
  holdersFetchedAt = Date.now();
  const list = document.getElementById('holdersList');
  try {
    const [largest, supply] = await Promise.all([
      solRpc('getTokenLargestAccounts', [CA_ADDR]),
      solRpc('getTokenSupply', [CA_ADDR])
    ]);
    const top = largest.value.slice(0, 10);
    const accounts = await solRpc('getMultipleAccounts', [top.map(t => t.address), { encoding: 'jsonParsed' }]);
    const totalSupply = supply.value.uiAmount;

    list.innerHTML = top.map((t, k) => {
      const acc = accounts.value[k];
      const owner = acc?.data?.parsed?.info?.owner || t.address;
      const pct = (t.uiAmount / totalSupply * 100).toFixed(2);
      return `<div class="holder-row">
        <a href="https://solscan.io/account/${owner}" target="_blank" rel="noopener">${shortAddr(owner)}</a>
        <span class="amt">${fmtTokens(t.uiAmount)}</span>
        <span class="pct">${pct}%</span>
      </div>`;
    }).join('') + '<div class="holders-note">#1 is usually the liquidity pool</div>';
  } catch (e) {
    holdersFetchedAt = 0;
    list.textContent = 'couldn’t load holders';
  }
}
document.getElementById('mcap').addEventListener('mouseenter', loadHolders);

function copyCA() {
  const ca = document.getElementById('ca').textContent;
  navigator.clipboard.writeText(ca).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}
